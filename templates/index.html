<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href=
    "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <title>an·no·ta·tion</title>
</head>
<body style="background-color:grey">
    <div>

    <div class="container-sm">
        <br><br><br>
        <div class="mb-3">
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <h2> an·no·ta·tion</h2>
                <h6>let AI describe your images</h6>
                <button type="submit">Upload</button>
                <input type="file" id="file" name="file" accept="image/jpeg" accept="image/jpg" required><br><br>
            </form>
        </div>

        {% if image_urls %}
        <div>
            {% for i in range(0, length) %}
                <div>
                    <img src="{{ image_urls[i] }}" alt="Image" style="max-width: 500px; margin-bottom: 20px;">
                </div>                
                <div>
                    <p class="h6">{{titles[i]}}</p>
                </div>
                <div>
                    <p class="h6">{{descriptions[i]}}</p>
                    <br>
                </div>
            {% endfor %}
        </div>

    {% else %}
        <p>no images updated...</p>
    {% endif %}
    </div>

</div>
</div>


    <script src=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js">
    </script>
</body>
</html>
